spring.application.name=medcare

# MySQL Database
# Local defaults are used when env vars are not set.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/medcare_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:Bhuvanesh}
