<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedCare - Book Appointment</title>
</head>

<body>

<h1>Quick Appointment</h1>

<form id="appointmentForm">

<label>Doctor:</label>
<select name="doctor">
<option value="Cardiology">Cardiology</option>
</select><br>

<label>Date:</label>
<input type="date" name="date" required><br>

<label>Name:</label>
<input type="text" name="name" required><br>

<label>Phone:</label>
<input type="tel" name="phone" required><br>

<button type="submit">Book Appointment</button>

</form>
<p id="statusMsg"></p>

<script>
document.getElementById("appointmentForm").addEventListener("submit", async function (event) {
  event.preventDefault();

  const form = event.target;
  const status = document.getElementById("statusMsg");
  status.textContent = "Saving...";
  const payload = {
    doctor: form.doctor.value,
    date: form.date.value,
    name: form.name.value,
    phone: form.phone.value,
    email: ""
  };

  try {
    const response = await fetch("/api/appointments", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      throw new Error("Request failed with status " + response.status);
    }
    const saved = await response.json();

    status.textContent = "Saved successfully. Appointment ID: " + saved.id;
    alert("Appointment saved successfully! ID: " + saved.id);
    form.reset();
  } catch (error) {
    status.textContent = "Save failed: " + error.message;
    alert("Could not save appointment. Open browser console for details.");
    console.error(error);
  }
});
</script>

</body>
</html>
